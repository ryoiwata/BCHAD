version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gofumpt
    - goimports
  disable:
    - fieldalignment

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable-all: true
    disable:
      - shadow
  goimports:
    local-prefixes: github.com/athena-digital/bchad

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: scripts/
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
  go: "1.22"
