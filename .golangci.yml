version: "2"
linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: scripts/
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10
run:
  timeout: 5m
  go: "1.22"

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true